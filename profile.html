<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Profile - Study Verse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }</style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">
  <header class="bg-white/10 backdrop-blur-md p-4 text-center border-b border-white/20">
    <h1 class="font-bold text-3xl text-yellow-300">🌌 STUDY VERSE</h1>
    <p class="text-xs italic mt-1 text-cyan-200">"An investment in knowledge pays the best interest."</p>
  </header>
  <main class="max-w-md w-full mx-auto p-4 my-auto">
    <div class="bg-white text-gray-800 p-8 rounded-3xl shadow-2xl space-y-4">
      <h2 class="font-bold text-2xl text-purple-800 text-center">⚙️ Student Identity</h2>
      <div>
        <label class="block font-bold text-xs mb-1 text-gray-500">Full Name</label>
        <input type="text" id="name-in" placeholder="E.g., Rohit Pathak" class="w-full p-3 border-2 border-purple-200 rounded-xl font-medium">
      </div>
      <div>
        <label class="block font-bold text-xs mb-1 text-gray-500">Class / Grade</label>
        <input type="text" id="class-in" placeholder="E.g., Class 12-A" class="w-full p-3 border-2 border-purple-200 rounded-xl font-medium">
      </div>
      <button onclick="saveProfile()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl shadow-lg transition">💾 Save Profile</button>
    </div>
  </main>
  <footer class="bg-black/20 p-4 text-center text-xs text-purple-200 border-t border-white/10"><p class="font-bold">Made By Pathak Rohit</p></footer>
  <script>
    const cached = JSON.parse(localStorage.getItem('sv_profile') || 'null');
    if(cached) { document.getElementById('name-in').value = cached.name; document.getElementById('class-in').value = cached.class; }
    function saveProfile() {
      const n = document.getElementById('name-in').value.trim(); const c = document.getElementById('class-in').value.trim();
      if(!n || !c) return alert('Fill all fields');
      localStorage.setItem('sv_profile', JSON.stringify({name: n, class: c}));
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
