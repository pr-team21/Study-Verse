<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achievements - Study Verse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }</style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">
  <header class="bg-white/10 backdrop-blur-md p-4 text-center border-b border-white/20">
    <h1 class="font-bold text-3xl text-yellow-300">🌌 STUDY VERSE</h1>
    <p class="text-xs italic mt-1 text-cyan-200">"Every achievement begins with the decision to try."</p>
  </header>
  <main class="max-w-2xl w-full mx-auto p-4 flex-grow my-4 space-y-4">
    <div class="bg-white text-gray-800 p-6 rounded-3xl shadow-xl">
      <h2 class="font-bold text-xl text-purple-900 text-center mb-4">🏆 Reward Badges</h2>
      <div id="badge-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 text-center"></div>
      <a href="dashboard.html" class="block w-full text-center bg-gray-800 text-white font-bold text-xs py-2 rounded-xl mt-4">Back</a>
    </div>
  </main>
  <footer class="bg-black/20 p-4 text-center text-xs text-purple-200 border-t border-white/10"><p class="font-bold">Made By Pathak Rohit</p></footer>
  <script>
    const pExist = localStorage.getItem('sv_profile') !== null;
    const stats = JSON.parse(localStorage.getItem('sv_stats') || '{"total":0,"correct":0,"incorrect":0}');
    const attList = Object.values(JSON.parse(localStorage.getItem('sv_attendance') || '{}')).filter(Boolean).length;
    const tExist = localStorage.getItem('sv_target') !== null;
    const tDone = JSON.parse(localStorage.getItem('sv_done_tasks') || '[]').length;
    const tTotal = tExist ? JSON.parse(localStorage.getItem('sv_target')).tasks.length : 0;

    const schema = [
      { n: "Beginners", i: "🥚", c: "from-blue-400 to-cyan-400", u: pExist },
      { n: "Hard Working", i: "🔨", c: "from-amber-400 to-orange-500", u: stats.total >= 3 },
      { n: "Consistent", i: "📅", c: "from-green-400 to-emerald-600", u: attList >= 1 },
      { n: "Dedicated", i: "🎯", c: "from-purple-400 to-pink-500", u: tExist },
      { n: "Obsessed Learner", i: "⚡", c: "from-red-500 to-rose-600", u: stats.total >= 10 },
      { n: "Ultra Consistent", i: "🔥", c: "from-yellow-400 to-red-500", u: attList >= 5 },
      { n: "Ultra Dedicated", i: "👑", c: "from-indigo-600 to-purple-900", u: tExist && tDone === tTotal && tTotal > 0 }
    ];

    const grid = document.getElementById('badge-grid');
    schema.forEach(b => {
      grid.innerHTML += `
        <div class="p-3 rounded-xl border ${b.u ? `bg-gradient-to-br ${b.c} text-white border-none shadow-md` : 'bg-gray-50 text-gray-300'}">
          <div class="text-3xl mb-1 ${b.u ? 'animate-bounce' : 'opacity-20'}">${b.i}</div>
          <p class="font-bold text-xs">${b.n}</p>
          <span class="text-[9px] font-black">${b.u ? 'UNLOCKED 🎉' : 'LOCKED'}</span>
        </div>
      `;
    });
  </script>
</body>
</html>
