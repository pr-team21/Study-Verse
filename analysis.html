<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Analysis - Study Verse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }</style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">
  <header class="bg-white/10 backdrop-blur-md p-4 text-center border-b border-white/20">
    <h1 class="font-bold text-3xl text-yellow-300">🌌 STUDY VERSE</h1>
    <p class="text-xs italic mt-1 text-cyan-200">"Data is the compass that guides your studying."</p>
  </header>
  <main class="max-w-md w-full mx-auto p-4 my-auto text-center">
    <div class="bg-white text-gray-800 p-6 rounded-3xl shadow-xl space-y-4">
      <h2 class="font-bold text-2xl text-purple-900">📊 Academic Analysis</h2>
      <div class="grid grid-cols-3 gap-2 text-xs font-bold">
        <div class="bg-blue-50 p-2 rounded-xl border">
          <div id="tot" class="text-xl text-blue-600 font-black">0</div><p class="text-[9px] text-gray-400">ATTEMPTED</p>
        </div>
        <div class="bg-emerald-50 p-2 rounded-xl border">
          <div id="cor" class="text-xl text-emerald-600 font-black">0</div><p class="text-[9px] text-gray-400">CORRECT</p>
        </div>
        <div class="bg-rose-50 p-2 rounded-xl border">
          <div id="inc" class="text-xl text-rose-600 font-black">0</div><p class="text-[9px] text-gray-400">INCORRECT</p>
        </div>
      </div>
      <div class="bg-purple-900 text-white p-4 rounded-xl">
        <div class="text-[10px] uppercase font-bold text-yellow-300 tracking-wider">Algorithmic Assessment Matrix Rank</div>
        <div id="rmk" class="text-2xl font-black my-1">FAIR</div>
        <p id="rmk-desc" class="text-xs text-purple-200">Log question data matrices within test modules to fuel analytics.</p>
      </div>
      <a href="dashboard.html" class="block w-full bg-gray-800 text-white py-2 rounded-xl font-bold text-xs">Back</a>
    </div>
  </main>
  <footer class="bg-black/20 p-4 text-center text-xs text-purple-200 border-t border-white/10"><p class="font-bold">Made By Pathak Rohit</p></footer>
  <script>
    const s = JSON.parse(localStorage.getItem('sv_stats') || '{"total":0,"correct":0,"incorrect":0}');
    document.getElementById('tot').innerText = s.total; document.getElementById('cor').innerText = s.correct; document.getElementById('inc').innerText = s.incorrect;
    
    let r = "FAIR", d = "Log question data matrices within test modules to fuel analytics.";
    if(s.total > 0) {
      const a = (s.correct / s.total) * 100;
      if(a >= 95) { r="OUTSTANDING"; d="Flawless metrics recorded."; }
      else if(a >= 85) { r="OUTSTANDING"; d="Flawless metrics recorded."; } // Matched to user request spectrum
      else if(a >= 75) { r="VERY GOOD"; d="Excellent foundational structure."; }
      else if(a >= 60) { r="GOOD"; d="Solid passing capacity metrics."; }
      else if(a >= 45) { r="FAIR"; d="Marginal gaps tracked in testing vectors."; }
      else { r="POOR"; d="Execute short note summaries instantly."; }
    }
    document.getElementById('rmk').innerText = r; document.getElementById('rmk-desc').innerText = d;
  </script>
</body>
</html>
