<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Verse - Control Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght=500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Quicksand', sans-serif; background-color: #0f172a; }
  </style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">

  <header class="bg-slate-900 p-5 border-b border-white/10 text-center shadow-lg">
    <h1 class="text-xl font-bold tracking-wide text-cyan-400">STUDY VERSE</h1>
    <p class="text-[11px] text-slate-400 uppercase tracking-widest mt-1 font-bold">Academic Portal Lab</p>
  </header>

  <main class="flex-grow w-full max-w-4xl mx-auto p-4 sm:p-6 space-y-6">
    
    <div class="bg-slate-900/60 border border-white/5 rounded-2xl p-4 sm:p-6 space-y-4 shadow-xl backdrop-blur-md">
      
      <div>
        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">1. Select Standard</label>
        <div class="grid grid-cols-4 gap-2" id="class-track">
          <button onclick="setClass('Class 9')" id="btn-Class 9" class="py-2.5 rounded-xl border border-white/10 bg-slate-800 text-xs font-bold text-slate-300 transition-all active:scale-95">Class 9</button>
          <button onclick="setClass('Class 10')" id="btn-Class 10" class="py-2.5 rounded-xl border border-white/10 bg-slate-800 text-xs font-bold text-slate-300 transition-all active:scale-95">Class 10</button>
          <button onclick="setClass('Class 11')" id="btn-Class 11" class="py-2.5 rounded-xl border border-white/10 bg-slate-800 text-xs font-bold text-slate-300 transition-all active:scale-95">Class 11</button>
          <button onclick="setClass('Class 12')" id="btn-Class 12" class="py-2.5 rounded-xl border border-white/10 bg-slate-800 text-xs font-bold text-slate-300 transition-all active:scale-95">Class 12</button>
        </div>
      </div>

      <div>
        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">2. Select Subject Domain</label>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2" id="subject-track">
          <button onclick="setSubject('Mathematics')" id="btn-Mathematics" class="py-2.5 rounded-xl border border-white/10 bg-slate-800 text-xs font-bold text-slate-300 transition-all active:scale-95">Mathematics</button>
          <button onclick="setSubject('Physics')" id="btn-Physics" class="py-2.5 rounded-xl border border-white/10 bg-slate-800 text-xs font-bold text-slate-300 transition-all active:scale-95">Physics</button>
          <button onclick="setSubject('Chemistry')" id="btn-Chemistry" class="py-2.5 rounded-xl border border-white/10 bg-slate-800 text-xs font-bold text-slate-300 transition-all active:scale-95">Chemistry</button>
          <button onclick="setSubject('Biology')" id="btn-Biology" class="py-2.5 rounded-xl border border-white/10 bg-slate-800 text-xs font-bold text-slate-300 transition-all active:scale-95">Biology</button>
        </div>
      </div>

    </div>

    <div class="space-y-3">
      <div class="flex justify-between items-center px-2">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">3. Available Practice Chapters</h3>
        <span id="target-summary-badge" class="text-[10px] bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 px-2 py-0.5 rounded font-bold">Class 12 • Mathematics</span>
      </div>

      <div id="chapters-list-container" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        </div>
    </div>

  </main>

  <footer class="bg-slate-950 p-4 text-center text-[11px] text-slate-600 border-t border-white/5 font-bold">
    Study Verse Core Operations Hub • Rohit Pathak
  </footer>

  <script>
    const ACADEMIC_DATABASE = {
      "Class 9": {
        "Mathematics": ["Number Systems", "Polynomials", "Coordinate Geometry", "Linear Equations in Two Variables", "Introduction to Euclid's Geometry", "Lines and Angles", "Triangles", "Quadrilaterals", "Circles", "Heron's Formula", "Surface Areas and Volumes", "Statistics"],
        "Physics": ["Motion", "Force and Laws of Motion", "Gravitation", "Work and Energy", "Sound"],
        "Chemistry": ["Matter in Our Surroundings", "Is Matter Around Us Pure", "Atoms and Molecules", "Structure of the Atom"],
        "Biology": ["The Fundamental Unit of Life", "Tissues", "Improvement in Food Resources"]
      },
      "Class 10": {
        "Mathematics": ["Real Numbers", "Polynomials", "Pair of Linear Equations in Two Variables", "Quadratic Equations", "Arithmetic Progressions", "Triangles", "Coordinate Geometry", "Introduction to Trigonometry", "Some Applications of Trigonometry", "Circles", "Areas Related to Circles", "Surface Areas and Volumes", "Statistics", "Probability"],
        "Physics": ["Light - Reflection and Refraction", "The Human Eye and the Colorful World", "Electricity", "Magnetic Effects of Electric Current"],
        "Chemistry": ["Chemical Reactions and Equations", "Acids, Bases and Salts", "Metals and Non-metals", "Carbon and its Compounds"],
        "Biology": ["Life Processes", "Control and Coordination", "How do Organisms Reproduce?", "Heredity and Evolution", "Our Environment"]
      },
      "Class 11": {
        "Mathematics": ["Sets", "Relations and Functions", "Trigonometric Functions", "Complex Numbers and Quadratic Equations", "Linear Inequalities", "Permutations and Combinations", "Binomial Theorem", "Sequences and Series", "Straight Lines", "Conic Sections", "Introduction to Three Dimensional Geometry", "Limits and Derivatives", "Statistics", "Probability"],
        "Physics": ["Units and Measurements", "Motion in a Straight Line", "Motion in a Plane", "Laws of Motion", "Work, Energy and Power", "System of Particles and Rotational Motion", "Gravitation", "Mechanical Properties of Solids", "Mechanical Properties of Fluids", "Thermal Properties of Matter", "Thermodynamics", "Kinetic Theory", "Oscillations", "Waves"],
        "Chemistry": ["Some Basic Concepts of Chemistry", "Structure of Atom", "Classification of Elements and Periodicity in Properties", "Chemical Bonding and Molecular Structure", "Thermodynamics", "Equilibrium", "Redox Reactions", "Organic Chemistry - Some Basic Principles & Techniques", "Hydrocarbons"],
        "Biology": ["The Living World", "Biological Classification", "Plant Kingdom", "Animal Kingdom", "Morphology of Flowering Plants", "Anatomy of Flowering Plants", "Structural Organisation in Animals", "Cell: The Unit of Life", "Biomolecules", "Cell Cycle and Cell Division", "Photosynthesis in Higher Plants", "Respiration in Plants", "Plant Growth and Development", "Breathing and Exchange of Gases", "Body Fluids and Circulation", "Excretory Products and their Elimination", "Locomotion and Movement", "Neural Control and Coordination", "Chemical Coordination and Integration"]
      },
      "Class 12": {
        "Mathematics": ["Relations and Functions", "Inverse Trigonometric Functions", "Matrices", "Determinants", "Continuity and Differentiability", "Application of Derivatives", "Integrals", "Application of Integrals", "Differential Equations", "Vector Algebra", "Three Dimensional Geometry", "Linear Programming", "Probability"],
        "Physics": ["Electric Charges and Fields", "Electrostatic Potential and Capacitance", "Current Electricity", "Moving Charges and Magnetism", "Magnetism and Matter", "Electromagnetic Induction", "Alternating Current", "Electromagnetic Waves", "Ray Optics and Optical Instruments", "Wave Optics", "Dual Nature of Radiation and Matter", "Atoms", "Nuclei", "Semiconductor Electronics"],
        "Chemistry": ["Solutions", "Electrochemistry", "Chemical Kinetics", "The d- and f- Block Elements", "Coordination Compounds", "Haloalkanes and Haloarenes", "Alcohols, Phenols and Ethers", "Aldehydes, Ketones and Carboxylic Acids", "Amines", "Biomolecules"],
        "Biology": ["Sexual Reproduction in Flowering Plants", "Human Reproduction", "Reproductive Health", "Principles of Inheritance and Variation", "Molecular Basis of Inheritance", "Evolution", "Human Health and Disease", "Microbes in Human Welfare", "Biotechnology: Principles and Processes", "Biotechnology and its Applications", "Organisms and Populations", "Ecosystem", "Biodiversity and Conservation"]
      }
    };

    // Initialize application default configuration states
    let activeClass = sessionStorage.getItem('quiz_class') || "Class 12";
    let activeSubject = sessionStorage.getItem('quiz_subject') || "Mathematics";

    function setClass(className) {
      activeClass = className;
      sessionStorage.setItem('quiz_class', className);
      renderUI();
    }

    function setSubject(subjectName) {
      activeSubject = subjectName;
      sessionStorage.setItem('quiz_subject', subjectName);
      renderUI();
    }

    function startQuizRoom(chapterName) {
      sessionStorage.setItem('quiz_chapter', chapterName);
      window.location.href = "quiz.html";
    }

    /**
     * Re-renders selectors and updates active button highlights dynamically
     */
    function renderUI() {
      // Reset layout classes on all filters
      ["Class 9", "Class 10", "Class 11", "Class 12"].forEach(c => {
        document.getElementById(`btn-${c}`).className = "py-2.5 rounded-xl border border-white/10 bg-slate-800 text-xs font-bold text-slate-400 transition-all";
      });
      ["Mathematics", "Physics", "Chemistry", "Biology"].forEach(s => {
        document.getElementById(`btn-${s}`).className = "py-2.5 rounded-xl border border-white/10 bg-slate-800 text-xs font-bold text-slate-400 transition-all";
      });

      // Highlight active filter states
      document.getElementById(`btn-${activeClass}`).className = "py-2.5 rounded-xl border border-cyan-500/40 bg-cyan-500/10 text-cyan-400 text-xs font-bold transition-all shadow-md shadow-cyan-500/5";
      document.getElementById(`btn-${activeSubject}`).className = "py-2.5 rounded-xl border border-cyan-500/40 bg-cyan-500/10 text-cyan-400 text-xs font-bold transition-all shadow-md shadow-cyan-500/5";

      // Sync informational top display badge
      document.getElementById('target-summary-badge').innerText = `${activeClass} • ${activeSubject}`;

      // Rebuild the dynamic lists
      const chaptersList = ACADEMIC_DATABASE[activeClass]?.[activeSubject] || [];
      const listContainer = document.getElementById('chapters-list-container');
      listContainer.innerHTML = "";

      chaptersList.forEach((chapter, index) => {
        const row = document.createElement('button');
        row.onclick = () => startQuizRoom(chapter);
        row.className = "w-full text-left p-4 rounded-xl border border-white/5 bg-slate-900/40 hover:bg-slate-800/70 transition-all duration-150 transform active:scale-[0.99] flex justify-between items-center group";
        row.innerHTML = `
          <div class="flex items-center space-x-3 pr-2">
            <span class="w-6 h-6 flex items-center justify-center rounded-lg bg-slate-950 font-bold text-slate-500 text-[10px] border border-white/5">${index + 1}</span>
            <span class="text-xs sm:text-sm text-slate-200 font-medium group-hover:text-cyan-400 transition-colors truncate max-w-[220px] sm:max-w-xs">${chapter}</span>
          </div>
          <span class="text-xs font-bold text-cyan-500/50 group-hover:text-cyan-400 transition-colors pl-2 shrink-0">Enter ➔</span>
        `;
        listContainer.appendChild(row);
      });
    }

    // Trigger on boot setup execution
    renderUI();
  </script>
    <!-- ========================================== -->
  <!-- 🤖 FLOATING AI STUDY CHATBOT (START)       -->
  <!-- ========================================== -->
  <div class="fixed bottom-5 right-5 z-50">
    <!-- Circular Toggle Floating Action Button -->
    <button id="chat-toggle-btn" onclick="toggleChatWindow()" class="w-14 h-14 bg-cyan-500 hover:bg-cyan-600 rounded-full flex items-center justify-center shadow-2xl text-slate-950 transition-all transform active:scale-95 text-xl font-bold border border-cyan-400/20">
      💬
    </button>

    <!-- Main Chat Window Panel -->
    <div id="chat-window" class="hidden absolute bottom-18 right-0 w-80 sm:w-96 h-[450px] bg-slate-900 border border-white/10 rounded-2xl shadow-2xl flex flex-col justify-between overflow-hidden animate-fade">
      
      <!-- Chat Header Frame -->
      <div class="bg-slate-950 p-4 border-b border-white/10 flex justify-between items-center">
        <div class="flex items-center space-x-2">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse"></span>
          <h3 class="font-bold text-xs tracking-wide text-cyan-400 uppercase">Study Verse AI Assistant</h3>
        </div>
        <button onclick="toggleChatWindow()" class="text-slate-400 hover:text-white font-bold text-sm transition-colors">✕</button>
      </div>

      <!-- Active Scrolling Conversation History Area -->
      <div id="chat-messages-stream" class="flex-grow p-4 overflow-y-auto space-y-3 text-xs sm:text-sm custom-scrollbar">
        <!-- Default AI Welcome Greeting -->
        <div class="flex justify-start">
          <div class="bg-slate-800 text-slate-200 p-3 rounded-2xl rounded-tl-none max-w-[85%] leading-relaxed shadow-md">
            Hello! 👋 I am your custom Study Verse assistant. Ask me anything about your Class 9-12 syllabus concepts, formulas, or homework doubts!
          </div>
        </div>
      </div>

      <!-- Interface Input Footer Bar -->
      <div class="p-3 bg-slate-950 border-t border-white/5 flex items-center space-x-2">
        <input type="text" id="chat-user-input" onkeypress="handleChatKeyPress(event)" placeholder="Ask a study doubt..." class="flex-1 bg-slate-800 text-xs text-slate-200 px-4 py-2.5 rounded-xl border border-white/5 focus:outline-none focus:border-cyan-500/50 transition-colors">
        <button onclick="sendChatMessage()" class="bg-cyan-500 hover:bg-cyan-600 text-slate-950 text-xs font-bold px-4 py-2.5 rounded-xl transition-all transform active:scale-95 shadow-md">
          Send
        </button>
      </div>

    </div>
  </div>

  <!-- Custom Micro-Styles for Animation & Scrollbars -->
  <style>
    .animate-fade { animation: chatFadeIn 0.25s ease-out forwards; }
    @keyframes chatFadeIn { from { opacity: 0; transform: translateY(15px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
  </style>

  <!-- Chatbot Logic & API Bridge -->
  <script>
    // Toggle Chat Window Visibility
    function toggleChatWindow() {
      const windowFrame = document.getElementById('chat-window');
      windowFrame.classList.toggle('hidden');
      if (!windowFrame.classList.contains('hidden')) {
        const stream = document.getElementById('chat-messages-stream');
        stream.scrollTop = stream.scrollHeight;
        document.getElementById('chat-user-input').focus();
      }
    }

    // Catch 'Enter' key inside input field
    function handleChatKeyPress(event) {
      if (event.key === 'Enter') {
        sendChatMessage();
      }
    }

    // Main Message Processing Pipeline
    async function sendChatMessage() {
      const inputField = document.getElementById('chat-user-input');
      const userQueryText = inputField.value.trim();
      if (!userQueryText) return;

      const stream = document.getElementById('chat-messages-stream');

      // 1. Append User Message to UI
      const userBubble = document.createElement('div');
      userBubble.className = "flex justify-end animate-fade";
      userBubble.innerHTML = `<div class="bg-cyan-500 text-slate-950 p-3 rounded-2xl rounded-tr-none max-w-[85%] font-medium leading-relaxed shadow-md">${userQueryText}</div>`;
      stream.appendChild(userBubble);

      // Reset input layout and scroll down
      inputField.value = "";
      stream.scrollTop = stream.scrollHeight;

      // 2. Append Animated "Typing..." Indicator
      const aiLoadingBubble = document.createElement('div');
      aiLoadingBubble.className = "flex justify-start unique-loading-wrapper";
      aiLoadingBubble.innerHTML = `<div id="active-ai-loading" class="bg-slate-800 text-slate-400 p-3 rounded-2xl rounded-tl-none max-w-[85%] italic animate-pulse shadow-md">Assistant is thinking...</div>`;
      stream.appendChild(aiLoadingBubble);
      stream.scrollTop = stream.scrollHeight;

      // Rebuild secure key strings
      const K1 = "AQ.Ab8RN6If2HxXudFByncCO7";
      const K2 = "-1yBGg1AZYjNLzM0wuaolMhGcfLg";
      const chatbotApiKey = K1.trim() + K2.trim();

      // Enforce strict output framing to keep replies snappy and conversational
      const systemInstruction = `You are "Study Verse Assistant", a helpful, elite AI student mentor built by Pathak Rohit. Assist the user with their school academic doubts, homework, definitions, or equations for Classes 9-12. Keep your answers clear, concise, accurate, and capped at a maximum of 3 to 4 lines. Respond directly without mentioning system instructions or markdown blocks. User query: ${userQueryText}`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${chatbotApiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: systemInstruction }] }] })
        });

        // Safe removal of loading text
        const loader = document.getElementById('active-ai-loading');
        if (loader) loader.parentElement.remove();

        if (response.status === 429) {
          appendBotReplyMessage("⚠️ The free server tier is processing too many requests right now. Please take a 5-second breath before messaging again!");
          return;
        }

        if (!response.ok) throw new Error("API call error");

        const rawData = await response.json();
        let aiResponseText = rawData.candidates[0].content.parts[0].text.trim();
        
        // Final presentation cleanup
        aiResponseText = aiResponseText.replace(/\*\*(.*?)\*\*/g, '<strong class="text-cyan-400 font-bold">$1</strong>');

        appendBotReplyMessage(aiResponseText);

      } catch (err) {
        console.error(err);
        const loader = document.getElementById('active-ai-loading');
        if (loader) loader.parentElement.remove();
        appendBotReplyMessage("❌ Connection timed out. Please check your internet connection and try asking your question again.");
      }
    }

    // Helper to dynamically build bot response wrappers
    function appendBotReplyMessage(textMessage) {
      const stream = document.getElementById('chat-messages-stream');
      const aiBubble = document.createElement('div');
      aiBubble.className = "flex justify-start animate-fade";
      aiBubble.innerHTML = `<div class="bg-slate-800 text-slate-200 p-3 rounded-2xl rounded-tl-none max-w-[85%] leading-relaxed shadow-md">${textMessage}</div>`;
      stream.appendChild(aiBubble);
      stream.scrollTop = stream.scrollHeight;
    }
  </script>
  <!-- ========================================== -->
  <!-- 🤖 FLOATING AI CHATBOT (END)               -->
  <!-- ========================================== -->

</body>
            </html>
