<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Room - Study Verse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- Link to your notes database -->
  <script src="syllabus-notes.js"></script>

  <style>
    body { 
      font-family: 'Quicksand', sans-serif; 
      background: linear-gradient(135deg, #111827 0%, #312e81 100%); 
    }
  </style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">
  
  <header class="bg-white/5 backdrop-blur-md p-4 text-center border-b border-white/10">
    <h1 class="font-bold text-3xl text-cyan-400">🌌 STUDY VERSE</h1>
    <p class="text-xs italic mt-1 text-purple-300">"Practice makes perfect."</p>
  </header>

  <main class="max-w-md w-full mx-auto p-4 my-auto">
    <div class="bg-slate-900/80 border border-white/10 text-white p-6 rounded-3xl shadow-2xl space-y-4 backdrop-blur-lg">
      <h2 class="font-bold text-xl text-center text-cyan-300">🎯 Quiz Configuration Room</h2>
      
      <!-- Class Selector -->
      <div>
        <label class="text-xs text-slate-400 font-bold uppercase tracking-wider">Select Your Class</label>
        <select id="c-sel" class="w-full mt-1 p-2.5 rounded-xl bg-slate-800 border border-slate-700 text-white font-medium focus:ring-2 focus:ring-cyan-500 outline-none">
          <option value="Class 10">Class 10</option>
          <option value="Class 11">Class 11</option>
          <option value="Class 12">Class 12</option>
        </select>
      </div>

      <!-- Subject Selector -->
      <div>
        <label class="text-xs text-slate-400 font-bold uppercase tracking-wider">Select Subject</label>
        <select id="s-sel" class="w-full mt-1 p-2.5 rounded-xl bg-slate-800 border border-slate-700 text-white font-medium focus:ring-2 focus:ring-cyan-500 outline-none">
          <option value="Physics">Physics</option>
          <option value="Chemistry">Chemistry</option>
          <option value="Mathematics">Mathematics</option>
        </select>
      </div>

      <!-- Chapter Selector -->
      <div>
        <label class="text-xs text-slate-400 font-bold uppercase tracking-wider">Select Chapter Target</label>
        <select id="ch-sel" class="w-full mt-1 p-2.5 rounded-xl bg-slate-800 border border-slate-700 text-white text-sm font-medium focus:ring-2 focus:ring-cyan-500 outline-none"></select>
      </div>
      
      <button onclick="go()" class="w-full mt-2 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-bold py-3 rounded-xl transition transform active:scale-95 shadow-lg shadow-cyan-500/20">
        🚀 Launch Practice Quiz
      </button>

      <a href="dashboard.html" class="block text-center text-xs font-bold text-slate-500 hover:text-slate-300 transition mt-2">
        Back to Dashboard
      </a>
    </div>
  </main>

  <footer class="bg-black/40 p-4 text-center text-xs text-slate-500 border-t border-white/5">
    <p class="font-bold tracking-wide">Made By Pathak Rohit</p>
  </footer>

  <script>
    // 📚 MASTER BACKUP LIST FOR CLASS 12 CHAPTERS IF THEY ARE MISSING IN NOTES
    const class12MasterChapters = {
      "Mathematics": ["Relations and Functions", "Inverse Trigonometric Functions", "Matrices", "Determinants", "Continuity and Differentiability", "Application of Derivatives", "Integrals", "Application of Integrals", "Differential Equations", "Vector Algebra", "Three Dimensional Geometry", "Linear Programming", "Probability"],
      "Physics": ["Electric Charges and Fields", "Electrostatic Potential and Capacitance", "Current Electricity", "Moving Charges and Magnetism", "Magnetism and Matter", "Electromagnetic Induction", "Alternating Current", "Electromagnetic Waves", "Ray Optics", "Wave Optics", "Dual Nature of Radiation", "Atoms", "Nuclei", "Semiconductor Electronics"],
      "Chemistry": ["Solutions", "Electrochemistry", "Chemical Kinetics", "d and f Block Elements", "Coordination Compounds", "Haloalkanes and Haloarenes", "Alcohols Phenols and Ethers", "Aldehydes Ketones and Carboxylic Acids", "Amines", "Biomolecules"]
    };

    function syncPracticeDropdowns() {
      const classSelect = document.getElementById('c-sel');
      const subjectSelect = document.getElementById('s-sel');
      const chSelect = document.getElementById('ch-sel');
      
      const selectedClass = classSelect.value;
      const selectedSubject = subjectSelect.value;
      
      chSelect.innerHTML = '';
      let chapters = [];

      // 1. Try to load from your syllabus-notes.js file database
      if (window.notesDatabase && window.notesDatabase[selectedClass] && window.notesDatabase[selectedClass][selectedSubject]) {
        chapters = Object.keys(window.notesDatabase[selectedClass][selectedSubject]);
      }

      // 2. If it's Class 12 and chapters are empty or missing, use the Master Backup List
      if (selectedClass === "Class 12" && chapters.length <= 1) {
        chapters = class12MasterChapters[selectedSubject] || [];
      }

      // 3. Populate dropdown menu options
      if (chapters.length > 0) {
        chapters.forEach(ch => {
          chSelect.innerHTML += `<option value="${ch}">${ch}</option>`;
        });
      } else {
        chSelect.innerHTML = `<option>⚠️ No chapters found</option>`;
      }
    }

    function go() {
      const selectedClass = document.getElementById('c-sel').value;
      const selectedSubject = document.getElementById('s-sel').value;
      const selectedChapter = document.getElementById('ch-sel').value;
      
      if (!selectedChapter || selectedChapter.includes("No chapters found")) {
        return alert("Please select a valid chapter.");
      }

      sessionStorage.setItem('quiz_class', selectedClass);
      sessionStorage.setItem('quiz_subject', selectedSubject);
      sessionStorage.setItem('quiz_chapter', selectedChapter);
      
      window.location.href = 'quiz.html';
    }

    document.getElementById('c-sel').addEventListener('change', syncPracticeDropdowns);
    document.getElementById('s-sel').addEventListener('change', syncPracticeDropdowns);

    syncPracticeDropdowns();
  </script>
</body>
        </html>
