<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Goal - Study Verse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }</style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">
  <header class="bg-white/10 backdrop-blur-md p-4 text-center border-b border-white/20">
    <h1 class="font-bold text-3xl text-yellow-300">🌌 STUDY VERSE</h1>
    <p class="text-xs italic mt-1 text-cyan-200">"What you get by achieving your goals is not as important as what you become."</p>
  </header>
  <main class="max-w-md w-full mx-auto p-4 my-auto">
    <div class="bg-white text-gray-800 p-6 rounded-3xl shadow-xl space-y-4">
      <h2 class="font-bold text-xl text-purple-900 text-center">🎯 Target Setup</h2>
      <div class="grid grid-cols-2 gap-2">
        <div><label class="text-xs text-gray-400 font-bold">Start Date</label><input type="date" id="start-d" class="w-full p-2 border rounded-xl text-sm"></div>
        <div><label class="text-xs text-gray-400 font-bold">End Date</label><input type="date" id="end-d" class="w-full p-2 border rounded-xl text-sm"></div>
      </div>
      <div>
        <label class="text-xs text-gray-400 font-bold">Tasks (One per line)</label>
        <textarea id="tasks-area" rows="4" class="w-full p-2 border rounded-xl text-sm"></textarea>
      </div>
      <button onclick="saveTarget()" class="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl">Save Target</button>
      <a href="dashboard.html" class="block text-center text-xs text-purple-600 font-bold mt-2">Back to Dashboard</a>
    </div>
  </main>
  <footer class="bg-black/20 p-4 text-center text-xs text-purple-200 border-t border-white/10"><p class="font-bold">Made By Pathak Rohit</p></footer>
  <script>
    const cached = JSON.parse(localStorage.getItem('sv_target') || 'null');
    if(cached) { document.getElementById('start-d').value = cached.start; document.getElementById('end-d').value = cached.end; document.getElementById('tasks-area').value = cached.tasks.join('\n'); }
    function saveTarget() {
      const s = document.getElementById('start-d').value; const e = document.getElementById('end-d').value;
      const t = document.getElementById('tasks-area').value.split('\n').filter(x=>x.trim());
      if(!s || !e || !t.length) return alert('Fill metrics completely');
      localStorage.setItem('sv_target', JSON.stringify({start: s, end: e, tasks: t}));
      localStorage.setItem('sv_done_tasks', '[]');
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
