<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Verse - AI Practice Room</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght=500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Quicksand', sans-serif; background-color: #0f172a; }
  </style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">

  <header class="bg-slate-900 p-4 border-b border-white/10 flex justify-between items-center px-6 shadow-md">
    <a href="practice.html" class="text-xs font-bold text-slate-400 hover:text-cyan-400 transition-colors">◀ Exit Room</a>
    <div class="text-center">
      <span id="meta-info" class="text-[10px] uppercase tracking-wider text-slate-500 block font-bold">Loading...</span>
      <h1 id="chapter-title" class="font-bold text-sm sm:text-base text-cyan-400">AI Quiz Lab</h1>
    </div>
    <div id="score-counter" class="text-xs font-bold bg-slate-800 px-3 py-1.5 rounded-full text-emerald-400 border border-emerald-500/20">
      Score: 0
    </div>
  </header>

  <main class="flex-grow w-full max-w-2xl mx-auto p-4 flex flex-col justify-center items-center">
    
    <div id="loading-card" class="w-full bg-slate-900 border border-white/10 rounded-2xl p-8 text-center shadow-xl space-y-4">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-cyan-400 mx-auto"></div>
      <p id="loading-text" class="text-slate-400 font-bold text-sm mt-4 animate-pulse">Gemini AI is crafting your study bundle (3 Questions)...</p>
    </div>

    <div id="quiz-container" class="w-full space-y-6 hidden">
      
      <div id="questions-holder" class="space-y-6"></div>

      <div class="pt-4 border-t border-white/5 flex justify-end">
        <button id="next-btn" onclick="fetchAIBatch()" class="bg-cyan-500 hover:bg-cyan-600 text-slate-950 text-xs sm:text-sm font-bold px-6 py-2.5 rounded-xl shadow-lg transition-all transform active:scale-95">
          Load Next 3 Questions ➔
        </button>
      </div>

    </div>

  </main>

  <footer class="bg-slate-950 p-3 text-center text-[11px] text-slate-600 border-t border-white/5 font-bold">
    Study Verse AI Core Portal • Pathak Rohit
  </footer>

  <script>
    // 🔒 SPLIT KEY CONFIGURATION
    const KEY_PART_1 = "AQ.Ab8RN6If2HxXudFByncCO7";
    const KEY_PART_2 = "-1yBGg1AZYjNLzM0wuaolMhGcfLg";

    const GEMINI_API_KEY = KEY_PART_1.trim() + KEY_PART_2.trim();

    // Grab session metadata passed from practice.html
    const selectedClass = sessionStorage.getItem('quiz_class') || "Class 12";
    const selectedSubject = sessionStorage.getItem('quiz_subject') || "Physics";
    const selectedChapter = sessionStorage.getItem('quiz_chapter') || "Electrostatics";

    // Global Score Tracking
    let globalScore = 0;

    // Initialize layout texts
    document.getElementById('meta-info').innerText = `${selectedClass} • ${selectedSubject}`;
    document.getElementById('chapter-title').innerText = selectedChapter;

    /**
     * Helper function to execute fetch requests with exponential backoff for HTTP 429 limits
     */
    async function fetchWithRetry(url, options, maxRetries = 3, delay = 1500) {
      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, options);
          
          // If hit with a rate limit, show notice, pause, and step up retry delay
          if (response.status === 429) {
            if (i === maxRetries - 1) {
              throw new Error("Rate limit exceeded (HTTP 429). Please wait a moment before trying again.");
            }
            const statusText = document.getElementById('loading-text');
            if (statusText) {
              statusText.innerText = `Rate limited by server. Retrying in ${(delay / 1000).toFixed(1)}s...`;
            }
            await new Promise(resolve => setTimeout(resolve, delay));
            delay *= 2; // Double the wait penalty duration for the next cycle
            continue;
          }
          
          return response;
        } catch (error) {
          if (i === maxRetries - 1) throw error;
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
    }

    /**
     * Pulls a structured array containing multiple question cards at one time
     */
    async function fetchAIBatch() {
      // Toggle visibility states back to loading screens
      document.getElementById('loading-card').classList.remove('hidden');
      document.getElementById('quiz-container').classList.add('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });

      // Reset loading card visual elements to original layout state
      document.getElementById('loading-card').innerHTML = `
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-cyan-400 mx-auto"></div>
        <p id="loading-text" class="text-slate-400 font-bold text-sm mt-4 animate-pulse">Gemini AI is crafting your study bundle (3 Questions)...</p>
      `;

      if (KEY_PART_1 === "PASTE_FIRST_HALF_HERE" || KEY_PART_2 === "PASTE_SECOND_HALF_HERE") {
        showMobileError("Setup Incomplete", "Please split your original API key into KEY_PART_1 and KEY_PART_2.");
        return;
      }

      // Explicit batch prompt asking for 3 independent nodes formatted inside a root list arrays context
      const promptText = `You are an academic database server. Target: ${selectedClass}, Subject: ${selectedSubject}, Chapter: ${selectedChapter}. Generate exactly THREE (3) unique, distinct multiple-choice questions relevant to this syllabus standard. You must respond ONLY with a valid JSON array containing exactly three question objects, matching this exact syntax: [{"question": "...", "options": ["A", "B", "C", "D"], "correctIndex": 0, "explanation": "..."}, {"question": "...", "options": ["A", "B", "C", "D"], "correctIndex": 1, "explanation": "..."}, {"question": "...", "options": ["A", "B", "C", "D"], "correctIndex": 2, "explanation": "..."}]. Do not wrap the JSON in markdown formatting blocks. Do not add conversational text outside the array.`;

      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        const options = {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        };

        // Call our retry helper engine instead of raw window.fetch
        const response = await fetchWithRetry(url, options);

        if (!response.ok) {
          throw new Error(`HTTP Error Status ${response.status}`);
        }

        const data = await response.json();
        let textResponse = data.candidates[0].content.parts[0].text.trim();
        
        // Strip markdown identifiers if injected by AI models automatically
        textResponse = textResponse.replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();

        const questionsBatch = JSON.parse(textResponse);
        renderBatchToUI(questionsBatch);

      } catch (error) {
        console.error(error);
        showMobileError("Generation Failure", `${error.message}`);
      }
    }

    /**
     * Appends the full batch onto the layout workspace
     */
    function renderBatchToUI(batchArray) {
      const holder = document.getElementById('questions-holder');
      holder.innerHTML = ""; // Wipe previous instances out

      batchArray.forEach((qObj, qIndex) => {
        // Create an individual containment card frame wrapper for each question
        const card = document.createElement('div');
        card.className = "w-full bg-slate-900 border border-white/10 rounded-2xl p-6 shadow-xl space-y-4 text-left";
        
        // Track unique tracking properties directly inside node scopes
        let hasAnsweredThisQuestion = false;
        const targetCorrectIndex = parseInt(qObj.correctIndex);

        // Build Inner Frame Layout DOM Elements
        card.innerHTML = `
          <div class="space-y-2">
            <div class="inline-block text-[10px] bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 px-2 py-0.5 rounded font-bold">QUESTION ${qIndex + 1} OF 3</div>
            <p class="text-base font-bold leading-relaxed text-slate-100">${qObj.question}</p>
          </div>
          <div class="options-grid grid grid-cols-1 gap-3"></div>
          <div class="explanation-box p-4 bg-slate-950 border border-white/5 rounded-xl space-y-2 hidden">
            <h4 class="feedback-heading font-bold text-xs uppercase tracking-wider">Explanation</h4>
            <p class="text-xs text-slate-400 leading-relaxed">${qObj.explanation}</p>
          </div>
        `;

        // Generate choice inputs inside sub-grids loop scope
        const optionsGrid = card.querySelector('.options-grid');
        const explanationBox = card.querySelector('.explanation-box');
        const feedbackHeading = card.querySelector('.feedback-heading');

        qObj.options.forEach((optionText, oIndex) => {
          const btn = document.createElement('button');
          btn.className = "w-full text-left p-4 rounded-xl border border-white/5 bg-slate-800/40 hover:bg-slate-800 text-xs sm:text-sm font-medium transition-all duration-200 transform active:scale-[0.99] flex items-center space-x-3";
          btn.innerHTML = `
            <span class="w-6 h-6 flex items-center justify-center rounded-lg bg-slate-950 font-bold text-slate-500 border border-white/5 text-[10px] uppercase">${String.fromCharCode(65 + oIndex)}</span>
            <span class="flex-1 text-slate-200">${optionText}</span>
          `;

          // Button click mechanics tied cleanly inside localized instances block
          btn.onclick = () => {
            if (hasAnsweredThisQuestion) return;
            hasAnsweredThisQuestion = true;

            const totalSiblings = optionsGrid.children;

            if (oIndex === targetCorrectIndex) {
              globalScore += 1;
              document.getElementById('score-counter').innerText = `Score: ${globalScore}`;
              btn.classList.add('border-emerald-500/50', 'bg-emerald-500/10');
              btn.querySelector('span').classList.add('bg-emerald-500', 'text-slate-950');
              feedbackHeading.innerText = "🎉 Correct Answer";
              feedbackHeading.className = "font-bold text-xs uppercase tracking-wider text-emerald-400";
            } else {
              btn.classList.add('border-rose-500/50', 'bg-rose-500/10');
              btn.querySelector('span').classList.add('bg-rose-500', 'text-white');
              
              // Light up standard correct targets visually
              const trueTargetButton = totalSiblings[targetCorrectIndex];
              trueTargetButton.classList.add('border-emerald-500/30', 'bg-emerald-500/5');
              feedbackHeading.innerText = "❌ Incorrect Answer";
              feedbackHeading.className = "font-bold text-xs uppercase tracking-wider text-rose-400";
            }

            // Dim inactive nodes
            for (let sibling of totalSiblings) {
              sibling.classList.add('opacity-60', 'cursor-not-allowed');
            }
            btn.classList.remove('opacity-60');
            explanationBox.classList.remove('hidden');
          };

          optionsGrid.appendChild(btn);
        });

        holder.appendChild(card);
      });

      // Swap out visual visibility views safely
      document.getElementById('loading-card').classList.add('hidden');
      document.getElementById('quiz-container').classList.remove('hidden');
    }

    /**
     * Custom Fallback Screen Messaging
     */
    function showMobileError(title, description) {
      document.getElementById('loading-card').innerHTML = `
        <div class="p-3 bg-rose-500/10 border border-rose-500/30 text-rose-400 font-bold rounded-xl text-xs inline-block">
          ⚠️ ${title}
        </div>
        <p class="text-xs text-slate-400 mt-3 px-4 leading-relaxed">${description}</p>
        <button onclick="fetchAIBatch()" class="mt-4 bg-slate-800 border border-white/10 hover:bg-slate-700 text-slate-200 text-xs font-bold px-4 py-2 rounded-xl transition-all">
          🔄 Try Loading Again
        </button>
      `;
    }

    // Launch setup immediately on file boot
    fetchAIBatch();
  </script>
</body>
    </html>
