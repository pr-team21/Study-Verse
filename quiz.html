<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Verse - AI Practice Room</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght=500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Quicksand', sans-serif; background-color: #0f172a; }
  </style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">

  <header class="bg-slate-900 p-4 border-b border-white/10 flex justify-between items-center px-6 shadow-md">
    <a href="practice.html" class="text-xs font-bold text-slate-400 hover:text-cyan-400 transition-colors">◀ Exit Room</a>
    <div class="text-center">
      <span id="meta-info" class="text-[10px] uppercase tracking-wider text-slate-500 block font-bold">Loading...</span>
      <h1 id="chapter-title" class="font-bold text-sm sm:text-base text-cyan-400">AI Quiz Lab</h1>
    </div>
    <div id="score-counter" class="text-xs font-bold bg-slate-800 px-3 py-1.5 rounded-full text-emerald-400 border border-emerald-500/20">
      Score: 0
    </div>
  </header>

  <main class="flex-grow w-full max-w-2xl mx-auto p-4 flex flex-col justify-center items-center">
    
    <div id="loading-card" class="w-full bg-slate-900 border border-white/10 rounded-2xl p-8 text-center shadow-xl space-y-4">
      <div id="spinner-element" class="animate-spin rounded-full h-12 w-12 border-b-2 border-cyan-400 mx-auto"></div>
      <p id="loading-text" class="text-slate-400 font-bold text-sm mt-4 animate-pulse">Gemini AI is building your initial setup room...</p>
    </div>

    <div id="quiz-card" class="w-full bg-slate-900 border border-white/10 rounded-2xl p-6 shadow-xl space-y-6 hidden">
      
      <div class="space-y-2">
        <div class="flex justify-between items-center">
          <div class="inline-block text-[10px] bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 px-2 py-0.5 rounded font-bold">MULTIPLE CHOICE</div>
          <span id="preload-status" class="text-[9px] text-slate-500 font-bold flex items-center gap-1">
            <span class="w-1.5 h-1.5 rounded-full bg-slate-700"></span> Idle
          </span>
        </div>
        <p id="question-text" class="text-base sm:text-lg font-bold leading-relaxed text-slate-100">
          </p>
      </div>

      <div id="options-container" class="grid grid-cols-1 gap-3">
        </div>

      <div id="explanation-box" class="p-4 bg-slate-950 border border-white/5 rounded-xl space-y-2 hidden">
        <h4 id="feedback-heading" class="font-bold text-xs uppercase tracking-wider">Explanation</h4>
        <p id="explanation-text" class="text-xs text-slate-400 leading-relaxed">
          </p>
      </div>

      <div class="pt-2 border-t border-white/5 flex justify-end">
        <button id="next-btn" onclick="handleNextClick()" class="bg-cyan-500 hover:bg-cyan-600 text-slate-950 text-xs sm:text-sm font-bold px-6 py-2.5 rounded-xl shadow-lg transition-all transform active:scale-95 hidden">
          Next AI Question ➔
        </button>
      </div>

    </div>

  </main>

  <footer class="bg-slate-950 p-3 text-center text-[11px] text-slate-600 border-t border-white/5 font-bold">
    Study Verse AI Core Portal • Pathak Rohit
  </footer>

  <script>
    // 🔒 SPLIT KEY CONFIGURATION
    const KEY_PART_1 = "AQ.Ab8RN6If2HxXudFByncCO7";
    const KEY_PART_2 = "-1yBGg1AZYjNLzM0wuaolMhGcfLg";

    const GEMINI_API_KEY = KEY_PART_1.trim() + KEY_PART_2.trim();

    // Grab session metadata
    const selectedClass = sessionStorage.getItem('quiz_class') || "Class 12";
    const selectedSubject = sessionStorage.getItem('quiz_subject') || "Physics";
    const selectedChapter = sessionStorage.getItem('quiz_chapter') || "Electrostatics";

    // App State Counters
    let globalScore = 0;
    let currentCorrectIndex = null;
    let hasAnswered = false;

    // ⚡ PRE-FETCH STORAGE POOLS
    let currentQuestionData = null;
    let nextQuestionData = null;
    let isFetchingNext = false;

    // Initialize layout texts
    document.getElementById('meta-info').innerText = `${selectedClass} • ${selectedSubject}`;
    document.getElementById('chapter-title').innerText = selectedChapter;

    /**
     * Core network handshake function
     */
    async function requestQuestionFromAI() {
      const promptText = `You are an academic server. Target Audience: ${selectedClass}, Subject: ${selectedSubject}, Chapter: ${selectedChapter}. Generate exactly ONE multiple-choice question relevant to this syllabus standard. You must respond ONLY with a valid JSON object matching this syntax: {"question": "...", "options": ["A", "B", "C", "D"], "correctIndex": 0, "explanation": "..."}. Do not use markdown code blocks. Do not add explanations outside the JSON object.`;

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      let textResponse = data.candidates[0].content.parts[0].text.trim();
      textResponse = textResponse.replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();
      
      return JSON.parse(textResponse);
    }

    /**
     * Initial startup sequence launcher
     */
    async function initialBoot() {
      if (KEY_PART_1 === "PASTE_FIRST_HALF_HERE" || KEY_PART_2 === "PASTE_SECOND_HALF_HERE") {
        showMobileError("Setup Incomplete", "Please open your quiz.html file and split your original API key into KEY_PART_1 and KEY_PART_2.");
        return;
      }

      // Re-initialize loader visual state
      document.getElementById('loading-card').classList.remove('hidden');
      document.getElementById('quiz-card').classList.add('hidden');
      document.getElementById('loading-text').innerText = "Gemini AI is building your practice room...";

      try {
        currentQuestionData = await requestQuestionFromAI();
        renderQuizToUI(currentQuestionData);
        
        // Give the API 2 seconds of breathing room before preloading the next card
        setTimeout(preloadNextQuestion, 2000);
      } catch (error) {
        showMobileError("Connection Failed", `Details: ${error.message}`);
      }
    }

    /**
     * Resilient Background Buffer Routine (Fails Silently)
     */
    async function preloadNextQuestion() {
      if (isFetchingNext || nextQuestionData !== null) return;
      
      isFetchingNext = true;
      document.getElementById('preload-status').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span> Pre-loading...`;
      
      try {
        nextQuestionData = await requestQuestionFromAI();
        document.getElementById('preload-status').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Ready`;
      } catch (e) {
        console.log("Background preloading paused due to server load. Will fetch on-demand next turn.");
        nextQuestionData = null; // Ensure it stays empty so fallback triggers smoothly
        document.getElementById('preload-status').innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span> On-Demand Mode`;
      } finally {
        isFetchingNext = false;
      }
    }

    /**
     * Handles transitions when clicking Next
     */
    async function handleNextClick() {
      if (nextQuestionData) {
        // Instant transition if pre-loaded successfully!
        currentQuestionData = nextQuestionData;
        nextQuestionData = null; 
        
        renderQuizToUI(currentQuestionData);
        setTimeout(preloadNextQuestion, 2000);
      } else {
        // Safe Fallback: If preloading was skipped or failed silently, fetch normally on screen
        document.getElementById('loading-card').classList.remove('hidden');
        document.getElementById('quiz-card').classList.add('hidden');
        document.getElementById('loading-text').innerText = "Generating next practice question...";
        
        try {
          currentQuestionData = await requestQuestionFromAI();
          renderQuizToUI(currentQuestionData);
          setTimeout(preloadNextQuestion, 2000);
        } catch (error) {
          showMobileError("Connection Failed", `Details: ${error.message}`);
        }
      }
    }

    /**
     * Helper function to print errors cleanly onto screen
     */
    function showMobileError(title, description) {
      document.getElementById('loading-card').classList.remove('hidden');
      document.getElementById('quiz-card').classList.add('hidden');
      document.getElementById('loading-card').innerHTML = `
        <div class="p-3 bg-rose-500/10 border border-rose-500/30 text-rose-400 font-bold rounded-xl text-xs inline-block">
          ⚠️ ${title}
        </div>
        <p class="text-xs text-slate-400 mt-3 px-4 leading-relaxed">${description}</p>
        <button onclick="initialBoot()" class="mt-4 bg-slate-800 border border-white/10 hover:bg-slate-700 text-slate-200 text-xs font-bold px-4 py-2 rounded-xl transition-all">
          🔄 Retry Connection
        </button>
      `;
    }

    /**
     * Maps the parsed JSON attributes directly into UI nodes
     */
    function renderQuizToUI(quizObj) {
      hasAnswered = false;
      currentCorrectIndex = parseInt(quizObj.correctIndex);
      
      document.getElementById('question-text').innerText = quizObj.question;
      document.getElementById('explanation-text').innerText = quizObj.explanation;
      document.getElementById('explanation-box').classList.add('hidden');
      document.getElementById('next-btn').classList.add('hidden');

      const container = document.getElementById('options-container');
      container.innerHTML = ""; 

      quizObj.options.forEach((optionText, index) => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-4 rounded-xl border border-white/5 bg-slate-800/40 hover:bg-slate-800 text-xs sm:text-sm font-medium transition-all duration-200 transform active:scale-[0.99] flex items-center space-x-3";
        btn.innerHTML = `
          <span class="w-6 h-6 flex items-center justify-center rounded-lg bg-slate-950 font-bold text-slate-500 border border-white/5 text-[10px] uppercase">${String.fromCharCode(65 + index)}</span>
          <span class="flex-1 text-slate-200">${optionText}</span>
        `;
        btn.onclick = () => selectAnswer(index, btn);
        container.appendChild(btn);
      });

      document.getElementById('loading-card').classList.add('hidden');
      document.getElementById('quiz-card').classList.remove('hidden');
    }

    /**
     * Visual grading selection engine
     */
    function selectAnswer(selectedIndex, selectedBtn) {
      if (hasAnswered) return; 
      hasAnswered = true;

      const allOptionButtons = document.getElementById('options-container').children;
      
      if (selectedIndex === currentCorrectIndex) {
        globalScore += 1;
        document.getElementById('score-counter').innerText = `Score: ${globalScore}`;
        selectedBtn.classList.add('border-emerald-500/50', 'bg-emerald-500/10');
        selectedBtn.querySelector('span').classList.add('bg-emerald-500', 'text-slate-950');
        document.getElementById('feedback-heading').innerText = "🎉 Correct Answer";
        document.getElementById('feedback-heading').className = "font-bold text-xs uppercase tracking-wider text-emerald-400";
      } else {
        selectedBtn.classList.add('border-rose-500/50', 'bg-rose-500/10');
        selectedBtn.querySelector('span').classList.add('bg-rose-500', 'text-white');
        const trueBtn = allOptionButtons[currentCorrectIndex];
        trueBtn.classList.add('border-emerald-500/30', 'bg-emerald-500/5');
        document.getElementById('feedback-heading').innerText = "❌ Incorrect Answer";
        document.getElementById('feedback-heading').className = "font-bold text-xs uppercase tracking-wider text-rose-400";
      }

      for (let btn of allOptionButtons) {
        btn.classList.add('opacity-60', 'cursor-not-allowed');
      }
      selectedBtn.classList.remove('opacity-60');

      document.getElementById('explanation-box').classList.remove('hidden');
      document.getElementById('next-btn').classList.remove('hidden');
    }

    // Launch core initial boot
    initialBoot();
  </script>
</body>
</html>
