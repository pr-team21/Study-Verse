<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Auto-Generation Quiz Room</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  
  <script src="syllabus-notes.js"></script>
  <script src="syllabus-questions.js"></script>

  <style>
    body { 
      font-family: 'Quicksand', sans-serif; 
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
    }
  </style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">

  <header class="bg-slate-900/60 backdrop-blur-md p-4 text-center border-b border-white/10 flex justify-between items-center px-6">
    <a href="practice.html" class="text-xs font-bold text-slate-400 hover:text-cyan-400">◀ Exit</a>
    <div>
      <h1 id="quiz-heading" class="font-bold text-lg text-cyan-400">Processing Factory...</h1>
      <p id="quiz-subheading" class="text-xs text-emerald-400 tracking-wider uppercase font-bold">Infinite Blueprint Mode</p>
    </div>
    <div class="w-8"></div>
  </header>

  <main class="max-w-md w-full mx-auto p-4 my-auto">
    <div class="flex justify-between items-center mb-2 px-1 text-xs text-slate-400">
      <span id="question-counter">Questions Solved: 0</span>
      <span id="blueprint-tag" class="text-amber-400 font-mono text-xxs bg-amber-500/10 px-2 py-0.5 rounded-md border border-amber-500/20">Blueprint</span>
    </div>

    <div class="bg-slate-900/90 border border-white/10 p-6 rounded-3xl shadow-2xl space-y-5">
      <div class="space-y-2">
        <h2 id="question-text" class="text-base font-bold text-slate-100 leading-relaxed">
          Generating automatic variables...
        </h2>
      </div>

      <div id="options-container" class="space-y-2.5"></div>
      
      <div class="pt-2">
        <button id="next-btn" onclick="generateNextDynamicQuestion()" class="hidden w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 font-bold py-2.5 rounded-xl transition shadow-lg shadow-cyan-500/20 text-sm">
          Next Auto-Generated Question ➡️
        </button>
      </div>
    </div>
  </main>

  <footer class="bg-black/40 p-4 text-center text-xs text-slate-600 border-t border-white/5">
    <p class="font-bold">Ecosystem Powered by Pathak Rohit</p>
  </footer>

  <script>
    // Pull current tracking configuration from local application memory storage
    const targetClass = sessionStorage.getItem('quiz_class') || "Class 12";
    const targetSubject = sessionStorage.getItem('quiz_subject') || "Mathematics";
    const targetChapter = sessionStorage.getItem('quiz_chapter') || "Vector Algebra";

    // Synchronize current page top header values text labels
    document.getElementById('quiz-heading').innerText = targetChapter;
    document.getElementById('quiz-subheading').innerText = `${targetClass} • ${targetSubject}`;

    // Master Dictionary holding your 50 blueprints patterns arrays per chapter
    const blueprintMasterList = {
      "Differential Equations": [
        "Differential equation identification", "Order of differential equation", "Degree of differential equation", 
        "Variable separable equation", "Homogeneous equation", "Linear differential equation", "General solution", 
        "Particular solution", "Initial value problem", "Formation of differential equation", "Solution verification", 
        "Family of curves", "Growth model", "Decay model", "Population model", "Physical application", "Rate relation", 
        "Equation comparison", "Parameter finding", "Function modelling", "Numerical substitution", "Assertion reason", 
        "Case study", "MCQ conceptual", "MCQ numerical", "Statement correctness", "Logical reasoning", "Error analysis", 
        "Problem solving", "Analytical thinking", "Graph interpretation", "Real life application", "Scientific application", 
        "Engineering application", "Data interpretation", "Equation correction", "Solution comparison", "Transformation question", 
        "Proof based", "Advanced differential equation", "Result verification", "Pattern recognition", "Equation prediction", 
        "Model comparison", "Analytical modelling", "Advanced numerical", "Function analysis", "Solution prediction", 
        "Reasoning based", "Mixed concept"
      ],
      "Vector Algebra": [
        "Vector identification", "Magnitude calculation", "Unit vector", "Position vector", "Vector addition", 
        "Vector subtraction", "Scalar multiplication", "Dot product", "Cross product", "Angle between vectors", 
        "Projection of vector", "Direction cosine", "Direction ratio", "Collinearity check", "Coplanarity check", 
        "Vector equation", "Resultant vector", "Component form", "Geometrical interpretation", "Vector comparison", 
        "Numerical substitution", "Assertion reason", "Case study", "MCQ conceptual", "MCQ numerical", "Statement correctness", 
        "Logical reasoning", "Error analysis", "Problem solving", "Analytical thinking", "Graph interpretation", 
        "Real life application", "Physics application", "Engineering application", "Data interpretation", "Parameter finding", 
        "Proof based", "Vector correction", "Transformation question", "Advanced vector", "Result verification", 
        "Pattern recognition", "Direction prediction", "Magnitude comparison", "Analytical modelling", "Advanced numerical", 
        "Coordinate application", "Space analysis", "Reasoning based", "Mixed concept"
      ],
      "Three Dimensional Geometry": [
        "Direction cosine", "Direction ratio", "Line equation", "Cartesian equation", "Vector equation", 
        "Distance between points", "Distance from point to plane", "Distance between lines", "Angle between lines", 
        "Angle between planes", "Plane equation", "Coplanarity condition", "Skew lines", "Shortest distance", 
        "Intersection analysis", "Coordinate geometry application", "Space interpretation", "Line comparison", 
        "Plane comparison", "Parameter finding", "Numerical substitution", "Assertion reason", "Case study", 
        "MCQ conceptual", "MCQ numerical", "Statement correctness", "Logical reasoning", "Error analysis", 
        "Problem solving", "Analytical thinking", "Graph interpretation", "Real life application", "Engineering application", 
        "Data interpretation", "Proof based", "Coordinate correction", "Transformation question", "Advanced geometry", 
        "Result verification", "Pattern recognition", "Distance comparison", "Angle comparison", "Analytical modelling", 
        "Advanced numerical", "Space modelling", "Coordinate analysis", "Equation correction", "Position prediction", 
        "Reasoning based", "Mixed concept"
      ],
      "Linear Programming": [
        "Objective function", "Constraint identification", "Feasible region", "Optimal solution", "Maximization problem", 
        "Minimization problem", "Graphical method", "Corner point method", "Constraint comparison", "Feasible solution", 
        "Infeasible solution", "Bounded region", "Unbounded region", "Resource allocation", "Profit maximization", 
        "Cost minimization", "Production planning", "Business application", "Economic application", "Graph interpretation", 
        "Numerical substitution", "Assertion reason", "Case study", "MCQ conceptual", "MCQ numerical", "Statement correctness", 
        "Logical reasoning", "Error analysis", "Problem solving", "Analytical thinking", "Real life application", 
        "Data interpretation", "Parameter finding", "Graph matching", "Constraint correction", "Optimization comparison", 
        "Transformation question", "Advanced optimization", "Result verification", "Pattern recognition", "Decision making", 
        "Management application", "Industrial application", "Analytical modelling", "Advanced numerical", "Profit analysis", 
        "Cost analysis", "Graph prediction", "Reasoning based", "Mixed concept"
      ],
      "Probability": [
        "Conditional probability", "Bayes theorem", "Independent events", "Dependent events", "Multiplication theorem", 
        "Addition theorem", "Random variable", "Probability distribution", "Mean calculation", "Variance calculation", 
        "Binomial distribution", "Event comparison", "Outcome prediction", "Sample space analysis", "Probability modelling", 
        "Risk analysis", "Decision making", "Data interpretation", "Statistical application", "Event verification", 
        "Numerical substitution", "Assertion reason", "Case study", "MCQ conceptual", "MCQ numerical", "Statement correctness", 
        "Logical reasoning", "Error analysis", "Problem solving", "Analytical thinking", "Real life application", 
        "Graph interpretation", "Parameter finding", "Probability correction", "Outcome comparison", "Theoretical probability", 
        "Experimental probability", "Advanced counting", "Permutation connection", "Combination connection", "Advanced probability", 
        "Result verification", "Pattern recognition", "Prediction analysis", "Analytical modelling", "Advanced numerical", 
        "Event ranking", "Probability comparison", "Reasoning based", "Mixed concept"
      ]
    };

    // Safely check if the target chapter exists in our blueprint registry database pool
    let activeBlueprintList = blueprintMasterList[targetChapter] || ["MCQ conceptual"];
    let currentQuestionCount = 1;
    let activeQuestionObj = null;
    let hasAnswered = false;

    function generateNextDynamicQuestion() {
      hasAnswered = false;
      document.getElementById('next-btn').classList.add('hidden');
      document.getElementById('question-counter').innerText = `Questions Solved: ${currentQuestionCount - 1}`;
      
      // 🎲 Select 1 blueprint item type entry from your array structure at random
      const randomBlueprint = activeBlueprintList[Math.floor(Math.random() * activeBlueprintList.length)];
      document.getElementById('blueprint-tag').innerText = `Type: ${randomBlueprint}`;

      // 🏭 Pass parameter variables down into your global external factory engine script
      if (window.generateBlueprintQuestion) {
        activeQuestionObj = window.generateBlueprintQuestion(targetClass, targetSubject, targetChapter, randomBlueprint);
      } else {
        activeQuestionObj = {
          q: "⚠️ Link Error: Could not discover window.generateBlueprintQuestion function hook loop inside your syllabus-questions.js script file assets.",
          o: ["Check File Configurations"],
          c: 0
        };
      }
      
      // Render layout update text strings out into view windows container elements
      document.getElementById('question-text').innerText = activeQuestionObj.q;
      
      const container = document.getElementById('options-container');
      container.innerHTML = '';
      
      activeQuestionObj.o.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-3.5 rounded-xl bg-slate-800/60 border border-slate-700 text-slate-200 text-sm transition hover:bg-slate-800 active:scale-98 outline-none duration-150 flex justify-between items-center";
        btn.innerText = option;
        btn.onclick = () => evaluateChoice(index, btn);
        container.appendChild(btn);
      });
    }

    function evaluateChoice(selectedIdx, element) {
      if (hasAnswered) return;
      hasAnswered = true;
      
      const buttons = document.getElementById('options-container').children;
      const correctIdx = activeQuestionObj.c;

      if (selectedIdx === correctIdx) {
        element.classList.remove('bg-slate-800/60', 'border-slate-700');
        element.classList.add('bg-emerald-500/20', 'border-emerald-500', 'text-emerald-300', 'font-bold');
        element.innerHTML += ` <span class="text-emerald-400 font-bold">✓ Correct</span>`;
      } else {
        element.classList.remove('bg-slate-800/60', 'border-slate-700');
        element.classList.add('bg-rose-500/20', 'border-rose-500', 'text-rose-300');
        element.innerHTML += ` <span class="text-rose-400 font-bold">✗ Incorrect</span>`;
        
        // Highlight correct response choice
        buttons[correctIdx].classList.remove('bg-slate-800/60', 'border-slate-700');
        buttons[correctIdx].classList.add('bg-emerald-500/20', 'border-emerald-500', 'text-emerald-300', 'font-bold');
      }

      currentQuestionCount++;
      document.getElementById('next-btn').classList.remove('hidden');
    }

    // Initialize execution script sequence routine when page loads on device interface screens
    generateNextDynamicQuestion();
  </script>
</body>
      </html>
