<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Examination - Study Verse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }</style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">
  <header class="bg-white/10 backdrop-blur-md p-4 text-center border-b border-white/20">
    <h1 class="font-bold text-3xl text-yellow-300">🌌 STUDY VERSE</h1>
    <p class="text-xs italic mt-1 text-cyan-200">"Strive for progress, not perfection."</p>
  </header>
  <main class="max-w-xl w-full mx-auto p-4 flex-grow my-4 space-y-4">
    <!-- Live Testing Wrapper -->
    <div id="quiz-block" class="bg-white text-gray-800 p-6 rounded-3xl shadow-xl">
      <h2 id="scope-title" class="font-bold text-lg text-purple-800 border-b pb-2 mb-4">Quiz Engine</h2>
      <div id="questions-box" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2"></div>
      <button onclick="gradeQuiz()" class="w-full mt-4 bg-purple-600 text-white font-bold py-2.5 rounded-xl">Submit</button>
    </div>
    <!-- Results Dashboard Wrapper -->
    <div id="result-block" class="bg-white text-gray-800 p-6 rounded-3xl shadow-xl hidden text-center space-y-4">
      <h2 class="font-bold text-2xl text-purple-900">Performance Report</h2>
      <div class="bg-gray-50 p-4 rounded-xl text-sm space-y-2 border text-left">
        <p class="flex justify-between"><span>Attempted:</span> <span id="r-att" class="font-bold">0</span></p>
        <p class="flex justify-between text-emerald-600"><span>Correct Answers:</span> <span id="r-cor" class="font-bold">0</span></p>
        <p class="flex justify-between text-rose-600"><span>Incorrect Answers:</span> <span id="r-inc" class="font-bold">0</span></p>
      </div>
      <a href="dashboard.html" class="block w-full bg-gray-800 text-white py-2.5 rounded-xl font-bold">Return to Dashboard</a>
    </div>
  </main>
  <footer class="bg-black/20 p-4 text-center text-xs text-purple-200 border-t border-white/10"><p class="font-bold">Made By Pathak Rohit</p></footer>
  <script>
    document.getElementById('scope-title').innerText = sessionStorage.getItem('quiz_scope') || 'Dynamic Assessment';
    const pool = [
      {q: "Identify the primary unit configuration vector calculation formula path.", o: ["Node A", "Vector Matrix B", "Dynamic Resolving Array", "Control Loop"], c: 1},
      {q: "What component functions directly under standard thermal conditions?", o: ["Element 1", "Isotope Core", "Synthesized Loop", "Catalyst Node"], c: 0},
      {q: "Evaluate the primary derivative function threshold parameter.", o: ["Zero Limit", "Infinite Range", "Fixed Baseline", "Dynamic Vector"], c: 2}
    ];
    const container = document.getElementById('questions-box');
    pool.forEach((item, idx) => {
      let opts = ''; item.o.forEach((o,oi) => {
        opts += `<label class="flex items-center space-x-2 p-2 border rounded-xl text-sm bg-gray-50 hover:bg-purple-50 cursor-pointer"><input type="radio" name="q-${idx}" value="${oi}"> <span>${o}</span></label>`;
      });
      container.innerHTML += `<div class="space-y-2 border-b pb-3"><p class="font-bold text-sm text-gray-800">${idx+1}. ${item.q}</p><div class="grid grid-cols-1 sm:grid-cols-2 gap-1.5">${opts}</div></div>`;
    });

    function gradeQuiz() {
      let att = 0, cor = 0, inc = 0;
      pool.forEach((item, idx) => {
        const sel = document.querySelector(`input[name="q-${idx}"]:checked`);
        if(sel) { att++; if(parseInt(sel.value) === item.c) cor++; else inc++; }
      });
      if(att === 0) return alert('Answer at least one question.');
      
      const st = JSON.parse(localStorage.getItem('sv_stats') || '{"total":0,"correct":0,"incorrect":0}');
      st.total += att; st.correct += cor; st.incorrect += inc;
      localStorage.setItem('sv_stats', JSON.stringify(st));

      document.getElementById('r-att').innerText = att;
      document.getElementById('r-cor').innerText = cor;
      document.getElementById('r-inc').innerText = inc;
      document.getElementById('quiz-block').classList.add('hidden');
      document.getElementById('result-block').classList.remove('hidden');
    }
  </script>
</body>
</html>
