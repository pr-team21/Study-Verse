<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Verse - AI Practice Room</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght=500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Quicksand', sans-serif; background-color: #0f172a; }
  </style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">

  <header class="bg-slate-900 p-4 border-b border-white/10 flex justify-between items-center px-6 shadow-md">
    <a href="practice.html" class="text-xs font-bold text-slate-400 hover:text-cyan-400 transition-colors">◀ Exit Room</a>
    <div class="text-center">
      <span id="meta-info" class="text-[10px] uppercase tracking-wider text-slate-500 block font-bold">Loading...</span>
      <h1 id="chapter-title" class="font-bold text-sm sm:text-base text-cyan-400">AI Quiz Lab</h1>
    </div>
    <div id="score-counter" class="text-xs font-bold bg-slate-800 px-3 py-1.5 rounded-full text-emerald-400 border border-emerald-500/20">
      Score: 0
    </div>
  </header>

  <main class="flex-grow w-full max-w-2xl mx-auto p-4 flex flex-col justify-center items-center">
    
    <div id="loading-card" class="w-full bg-slate-900 border border-white/10 rounded-2xl p-8 text-center shadow-xl space-y-4">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-cyan-400 mx-auto"></div>
      <p id="loading-text" class="text-slate-400 font-bold text-sm mt-4 animate-pulse">Gemini AI is generating your next question...</p>
    </div>

    <div id="quiz-container" class="w-full space-y-6 hidden">
      
      <div class="w-full bg-slate-900 border border-white/10 rounded-2xl p-6 shadow-xl space-y-4 text-left">
        <div class="space-y-2">
          <div id="question-badge" class="inline-block text-[10px] bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 px-2 py-0.5 rounded font-bold">QUESTION COMPILING</div>
          <p id="question-text" class="text-base font-bold leading-relaxed text-slate-100">Loading question context...</p>
        </div>
        
        <div id="options-grid" class="grid grid-cols-1 gap-3"></div>
        
        <div id="explanation-box" class="p-4 bg-slate-950 border border-white/5 rounded-xl space-y-2 hidden">
          <h4 id="feedback-heading" class="font-bold text-xs uppercase tracking-wider">Explanation</h4>
          <p id="explanation-text" class="text-xs text-slate-400 leading-relaxed"></p>
        </div>
      </div>

      <div class="pt-4 border-t border-white/5 flex justify-end">
        <button id="next-btn" onclick="fetchSingleQuestion()" class="bg-cyan-500 hover:bg-cyan-600 text-slate-950 text-xs sm:text-sm font-bold px-6 py-2.5 rounded-xl shadow-lg transition-all transform active:scale-95 hidden">
          Next Question ➔
        </button>
      </div>

    </div>

  </main>

  <footer class="bg-slate-950 p-3 text-center text-[11px] text-slate-600 border-t border-white/5 font-bold">
    Study Verse AI Core Portal • Pathak Rohit
  </footer>

  <script>
    // 🔒 SPLIT KEY CONFIGURATION
    const KEY_PART_1 = "AQ.Ab8RN6If2HxXudFByncCO7";
    const KEY_PART_2 = "-1yBGg1AZYjNLzM0wuaolMhGcfLg";
    const GEMINI_API_KEY = KEY_PART_1.trim() + KEY_PART_2.trim();

    // Grab session choices from practice.html
    const selectedClass = sessionStorage.getItem('quiz_class') || "Class 12";
    const selectedSubject = sessionStorage.getItem('quiz_subject') || "Physics";
    const selectedChapter = sessionStorage.getItem('quiz_chapter') || "Electrostatics";

    // Tracking states
    let globalScore = 0;
    let totalQuestionsAnswered = 0;
    let currentQuestionData = null;

    // Apply baseline metadata texts
    document.getElementById('meta-info').innerText = `${selectedClass} • ${selectedSubject}`;
    document.getElementById('chapter-title').innerText = selectedChapter;

    /**
     * Pulls ONE high-quality question with maximum reliability and minimal rate impact
     */
    async function fetchSingleQuestion() {
      // Hide active workspace, reset containers, show loading spinner
      document.getElementById('loading-card').classList.remove('hidden');
      document.getElementById('quiz-container').classList.add('hidden');
      document.getElementById('explanation-box').classList.add('hidden');
      document.getElementById('next-btn').classList.add('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });

      // Put back original spinner text
      document.getElementById('loading-card').innerHTML = `
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-cyan-400 mx-auto"></div>
        <p class="text-slate-400 font-bold text-sm mt-4 animate-pulse">Gemini AI is generating your next question...</p>
      `;

      // Prompt optimized for lightning fast single-node validation
      const promptText = `You are an educational testing engine. Target: ${selectedClass}, Subject: ${selectedSubject}, Chapter: ${selectedChapter}. Generate exactly ONE (1) multiple-choice question suitable for this syllabus. Respond ONLY with a valid JSON object matching this exact syntax: {"question": "...", "options": ["A", "B", "C", "D"], "correctIndex": 0, "explanation": "..."}. Do not wrap code blocks in markdown. Do not add any conversational text.`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });

        // If rate limited, offer a clean, manual retry button immediately
        if (response.status === 429) {
          showLayoutError("Server Resting", "The free AI server is processing requests. Click below to try again instantly.");
          return;
        }

        if (!response.ok) {
          throw new Error(`Server returned HTTP ${response.status}`);
        }

        const data = await response.json();
        let textResponse = data.candidates[0].content.parts[0].text.trim();
        
        // Sanitize markdown artifacts safely
        textResponse = textResponse.replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();

        currentQuestionData = JSON.parse(textResponse);
        renderQuestionToUI();

      } catch (error) {
        console.error(error);
        showLayoutError("Connection Refused", `Could not load your question. Reason: ${error.message}`);
      }
    }

    /**
     * Builds and updates the single question frame UI
     */
    function renderQuestionToUI() {
      totalQuestionsAnswered++;
      
      // Update basic layout elements
      document.getElementById('question-badge').innerText = `QUESTION ${totalQuestionsAnswered}`;
      document.getElementById('question-text').innerText = currentQuestionData.question;
      document.getElementById('explanation-text').innerText = currentQuestionData.explanation;

      const grid = document.getElementById('options-grid');
      grid.innerHTML = ""; // Empty previous choices

      let hasSelectedAnOption = false;
      const correctIdx = parseInt(currentQuestionData.correctIndex);

      currentQuestionData.options.forEach((optionText, index) => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-4 rounded-xl border border-white/5 bg-slate-800/40 hover:bg-slate-800 text-xs sm:text-sm font-medium transition-all duration-200 transform active:scale-[0.99] flex items-center space-x-3";
        btn.innerHTML = `
          <span class="w-6 h-6 flex items-center justify-center rounded-lg bg-slate-950 font-bold text-slate-500 border border-white/5 text-[10px] uppercase">${String.fromCharCode(65 + index)}</span>
          <span class="flex-1 text-slate-200">${optionText}</span>
        `;

        btn.onclick = () => {
          if (hasSelectedAnOption) return;
          hasSelectedAnOption = true;

          const heading = document.getElementById('feedback-heading');
          const elements = grid.children;

          if (index === correctIdx) {
            globalScore++;
            document.getElementById('score-counter').innerText = `Score: ${globalScore}`;
            btn.classList.add('border-emerald-500/50', 'bg-emerald-500/10');
            btn.querySelector('span').classList.add('bg-emerald-500', 'text-slate-950');
            heading.innerText = "🎉 Correct Answer";
            heading.className = "font-bold text-xs uppercase tracking-wider text-emerald-400";
          } else {
            btn.classList.add('border-rose-500/50', 'bg-rose-500/10');
            btn.querySelector('span').classList.add('bg-rose-500', 'text-white');
            
            // Light up the correct target
            elements[correctIdx].classList.add('border-emerald-500/30', 'bg-emerald-500/5');
            heading.innerText = "❌ Incorrect Answer";
            heading.className = "font-bold text-xs uppercase tracking-wider text-rose-400";
          }

          // Dim unselected alternatives out
          for (let item of elements) {
            item.classList.add('opacity-60', 'cursor-not-allowed');
          }
          btn.classList.remove('opacity-60');

          // Reveal description components and the clean next button
          document.getElementById('explanation-box').classList.remove('hidden');
          document.getElementById('next-btn').classList.remove('hidden');
        };

        grid.appendChild(btn);
      });

      // Show the quiz board
      document.getElementById('loading-card').classList.add('hidden');
      document.getElementById('quiz-container').classList.remove('hidden');
    }

    /**
     * Clean interactive fallback messaging
     */
    function showLayoutError(title, description) {
      document.getElementById('loading-card').innerHTML = `
        <div class="p-3 bg-amber-500/10 border border-amber-500/30 text-amber-400 font-bold rounded-xl text-xs inline-block animate-pulse">
          ⚠️ ${title}
        </div>
        <p class="text-xs text-slate-400 mt-3 px-4 leading-relaxed">${description}</p>
        <button onclick="fetchSingleQuestion()" class="mt-4 bg-slate-800 border border-white/10 hover:bg-slate-700 text-slate-200 text-xs font-bold px-4 py-2 rounded-xl transition-all active:scale-95">
          🔄 Try Loading Question Again
        </button>
      `;
    }

    // Launch initial question immediately upon loading
    fetchSingleQuestion();
  </script>
</body>
            </html>
