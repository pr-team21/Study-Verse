<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Engine - Study Verse</title>
  <!-- Tailwind CSS Framework -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- 📱 LINK TO YOUR MASTER QUESTION BANK DATA FILE -->
  <script src="syllabus-questions.js"></script>

  <style>
    body { 
      font-family: 'Quicksand', sans-serif; 
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
    }
  </style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">

  <!-- Top Navigation Header -->
  <header class="bg-slate-900/60 backdrop-blur-md p-4 text-center border-b border-white/10 flex justify-between items-center px-6">
    <a href="practice.html" class="text-xs font-bold text-slate-400 hover:text-cyan-400 transition">◀ Exit</a>
    <div>
      <h1 id="quiz-heading" class="font-bold text-lg text-cyan-400">Loading Quiz...</h1>
      <p id="quiz-subheading" class="text-xxs text-slate-400 tracking-wide uppercase mt-0.5">Practice Session</p>
    </div>
    <div class="w-8"></div> <!-- Empty spacer for balance -->
  </header>

  <!-- Interactive Quiz Card Container -->
  <main class="max-w-md w-full mx-auto p-4 my-auto">
    
    <!-- Progress Indicator -->
    <div class="flex justify-between items-center mb-2 px-1 text-xs text-slate-400">
      <span id="question-counter">Question 0 of 0</span>
      <span id="score-counter" class="text-emerald-400 font-bold">Score: 0</span>
    </div>

    <div class="bg-slate-900/90 border border-white/10 p-6 rounded-3xl shadow-2xl space-y-5 backdrop-blur-xl">
      
      <!-- Target Question Display Area -->
      <div class="space-y-2">
        <h2 id="question-text" class="text-base font-bold text-slate-100 leading-relaxed">
          Retrieving your practice set data questions...
        </h2>
      </div>

      <!-- Option Action Buttons Group -->
      <div id="options-container" class="space-y-2.5">
        <!-- Generated dynamically via JavaScript -->
      </div>
      
      <!-- Control Buttons Footer -->
      <div class="pt-2 flex space-x-3">
        <button id="next-btn" onclick="nextQuestion()" class="hidden w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold py-2.5 rounded-xl transition shadow-lg shadow-emerald-500/10">
          Next Question ➡️
        </button>
      </div>

    </div>
  </main>

  <!-- Global Results Dashboard Card (Hidden by default) -->
  <div id="results-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-50">
    <div class="bg-slate-900 border border-white/10 max-w-sm w-full p-6 rounded-3xl text-center space-y-4 shadow-2xl">
      <h2 class="text-2xl font-bold text-yellow-400">🎉 Quiz Completed!</h2>
      <p class="text-slate-300 text-sm">You have finished the evaluation sequence for this chapter.</p>
      
      <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5">
        <p class="text-xs text-slate-400 uppercase tracking-wider font-bold">Your Total Score</p>
        <p id="final-score" class="text-4xl font-bold text-cyan-400 mt-1">0 / 0</p>
      </div>

      <div class="space-y-2 pt-2">
        <button onclick="window.location.reload()" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2.5 rounded-xl transition">
          🔄 Retake This Quiz
        </button>
        <a href="practice.html" class="block w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2.5 rounded-xl transition text-sm">
          Select Another Chapter
        </a>
      </div>
    </div>
  </div>

  <!-- Footer Brand Signature -->
  <footer class="bg-black/40 p-4 text-center text-xs text-slate-600 border-t border-white/5">
    <p class="font-bold">Engine System Built by Pathak Rohit</p>
  </footer>

  <!-- ⚙️ CORE INTERACTIVE CONTROL SCRIPT -->
  <script>
    // Extract setup data from Session memory storage pipes
    const targetSubject = sessionStorage.getItem('quiz_subject') || "Physics";
    const targetChapter = sessionStorage.getItem('quiz_chapter') || "Electric Charges and Fields";

    // Set UI labels based on selections
    document.getElementById('quiz-heading').innerText = targetChapter;
    document.getElementById('quiz-subheading').innerText = targetSubject;

    // Pull active question arrays out of your window file: syllabus-questions.js
    let questionsPool = [];
    if (window.masterQuestionBank && window.masterQuestionBank[targetChapter]) {
      questionsPool = window.masterQuestionBank[targetChapter];
    } else {
      // Fallback message if a user taps a chapter you haven't written questions for yet
      questionsPool = [
        {
          q: `🚧 No questions uploaded for "${targetChapter}" yet! Open your syllabus-questions.js file on your phone to add them.`,
          o: ["Return to Practice Selection Setup"],
          c: 0,
          isFallback: true
        }
      ];
    }

    let currentIndex = 0;
    let runningScore = 0;
    let hasAnsweredCurrent = false;

    function renderActiveQuestion() {
      hasAnsweredCurrent = false;
      document.getElementById('next-btn').classList.add('hidden');
      
      const currentQuestion = questionsPool[currentIndex];
      
      // Update counters display layout
      document.getElementById('question-counter').innerText = `Question ${currentIndex + 1} of ${questionsPool.length}`;
      document.getElementById('score-counter').innerText = `Score: ${runningScore}`;
      document.getElementById('question-text').innerText = currentQuestion.q;
      
      // Clear out the old selection items buttons container loop
      const optionsContainer = document.getElementById('options-container');
      optionsContainer.innerHTML = '';
      
      // Inject options array buttons list layout
      currentQuestion.o.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-3.5 rounded-xl bg-slate-800/60 border border-slate-700 text-slate-200 font-medium transition hover:bg-slate-800 active:scale-98 outline-none text-sm duration-150 flex justify-between items-center";
        btn.innerText = option;
        
        // Handle tapping mechanics safely on phone touches
        btn.onclick = () => selectOption(index, btn);
        optionsContainer.appendChild(btn);
      });
    }

    function selectOption(selectedIndex, clickedButton) {
      if (hasAnsweredCurrent) return; // Freeze clicks once an option is picked
      
      const currentQuestion = questionsPool[currentIndex];
      
      // Handle the safety redirect button if it's an empty fallback slide
      if (currentQuestion.isFallback) {
        window.location.href = "practice.html";
        return;
      }

      hasAnsweredCurrent = true;
      const optionsButtons = document.getElementById('options-container').children;
      const correctIndex = currentQuestion.c;

      if (selectedIndex === correctIndex) {
        // Correct answer selected -> Paint it Emerald Green
        clickedButton.classList.remove('bg-slate-800/60', 'border-slate-700');
        clickedButton.classList.add('bg-emerald-500/20', 'border-emerald-500', 'text-emerald-300', 'font-bold');
        clickedButton.innerHTML += ` <span class="text-emerald-400 font-bold">✓ Correct</span>`;
        runningScore++;
        document.getElementById('score-counter').innerText = `Score: ${runningScore}`;
      } else {
        // Wrong answer selected -> Paint it Red and highlight the correct choice in Green
        clickedButton.classList.remove('bg-slate-800/60', 'border-slate-700');
        clickedButton.classList.add('bg-rose-500/20', 'border-rose-500', 'text-rose-300');
        clickedButton.innerHTML += ` <span class="text-rose-400 font-bold">✗ Incorrect</span>`;
        
        const correctButton = optionsButtons[correctIndex];
        correctButton.classList.remove('bg-slate-800/60', 'border-slate-700');
        correctButton.classList.add('bg-emerald-500/20', 'border-emerald-500', 'text-emerald-300', 'font-bold');
      }

      // Unhide tracking controller forward progression button execution trigger element
      document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
      if (currentIndex + 1 < questionsPool.length) {
        currentIndex++;
        renderActiveQuestion();
      } else {
        // Reach terminal boundary state -> Unveil modal panel
        document.getElementById('final-score').innerText = `${runningScore} / ${questionsPool.length}`;
        document.getElementById('results-modal').classList.remove('hidden');
      }
    }

    // Initialize execution right out of the structural gateway container frame link
    renderActiveQuestion();
  </script>
</body>
</html>
