<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Short Notes Directory - Study Verse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  
  <script src="syllabus-notes.js"></script>

  <style>
    body { 
      font-family: 'Quicksand', sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
    }
  </style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">
  
  <header class="bg-white/10 backdrop-blur-md p-4 text-center border-b border-white/20">
    <h1 class="font-bold text-3xl text-yellow-300">🌌 STUDY VERSE</h1>
    <p class="text-xs italic mt-1 text-cyan-200">"Knowledge is power."</p>
  </header>

  <main class="max-w-md w-full mx-auto p-4 my-auto">
    <div class="bg-white text-gray-800 p-6 rounded-3xl shadow-xl space-y-4">
      <h2 class="font-bold text-xl text-center text-amber-700">📚 Notes Engine Filter</h2>
      
      <div>
        <label class="text-xs text-gray-400 font-bold">Select Class</label>
        <select id="nc" class="w-full p-2 border rounded-xl bg-gray-50 font-medium">
          <option value="Class 10">Class 10</option>
          <option value="Class 11">Class 11</option>
          <option value="Class 12">Class 12</option>
        </select>
      </div>

      <div>
        <label class="text-xs text-gray-400 font-bold">Select Subject</label>
        <select id="ns" class="w-full p-2 border rounded-xl bg-gray-50 font-medium">
          <option value="Physics">Physics</option>
          <option value="Chemistry">Chemistry</option>
          <option value="Mathematics">Mathematics</option>
        </select>
      </div>

      <div>
        <label class="text-xs text-gray-400 font-bold">Select Chapter</label>
        <select id="nch" class="w-full p-2 border rounded-xl bg-gray-50 font-medium text-sm"></select>
      </div>
      
      <button onclick="loadNotes()" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-2.5 rounded-xl transition shadow-md">
        🔍 Open Notes Document
      </button>
      <a href="dashboard.html" class="block text-center text-xs font-bold text-gray-400 hover:text-gray-600 mt-2">
        Back to Dashboard
      </a>
    </div>
  </main>

  <footer class="bg-black/20 p-4 text-center text-xs text-purple-200 border-t border-white/10">
    <p class="font-bold">Made By Pathak Rohit</p>
  </footer>

  <script>
    // This script automatically loops through your syllabus-notes.js file 
    // and populates your dropdown menus on mobile devices seamlessly.
    function updateDropdowns() {
      const classSelect = document.getElementById('nc');
      const subjectSelect = document.getElementById('ns');
      const chSelect = document.getElementById('nch');
      
      const selectedClass = classSelect.value;
      const selectedSubject = subjectSelect.value;
      
      // Reset the chapter selector clear
      chSelect.innerHTML = '';
      
      // Look inside window.notesDatabase from your syllabus-notes.js file
      if (window.notesDatabase && window.notesDatabase[selectedClass] && window.notesDatabase[selectedClass][selectedSubject]) {
        const chapters = Object.keys(window.notesDatabase[selectedClass][selectedSubject]);
        
        chapters.forEach(ch => {
          chSelect.innerHTML += `<option value="${ch}">${ch}</option>`;
        });
      } else {
        chSelect.innerHTML = `<option>⚠️ No chapters configured</option>`;
      }
    }

    function loadNotes() {
      const cl = document.getElementById('nc').value;
      const sb = document.getElementById('ns').value;
      const ch = document.getElementById('nch').value;
      
      if (ch.includes("No chapters configured")) {
         return alert("Please select a valid chapter with active notes content.");
      }

      // Grabs the custom summary strings safely out of your phone data dictionary file
      const text = window.notesDatabase[cl][sb][ch];
      
      // Packages up the assets and pushes them over to the view module reader screen
      sessionStorage.setItem('notes_title', `${sb} - ${ch}`);
      sessionStorage.setItem('notes_content', text);
      window.location.href = 'notes-view.html';
    }

    // Connect smart interaction hooks for screen taps
    document.getElementById('nc').addEventListener('change', updateDropdowns);
    document.getElementById('ns').addEventListener('change', updateDropdowns);

    // Bootstrap the layout variables automatically on initial load execution
    updateDropdowns();
  </script>
</body>
    </html>
