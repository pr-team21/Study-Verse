<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Short Notes Directory - Study Verse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Quicksand', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }</style>
</head>
<body class="min-h-screen text-white flex flex-col justify-between">
  <header class="bg-white/10 backdrop-blur-md p-4 text-center border-b border-white/20">
    <h1 class="font-bold text-3xl text-yellow-300">🌌 STUDY VERSE</h1>
    <p class="text-xs italic mt-1 text-cyan-200">"Knowledge is power."</p>
  </header>
  <main class="max-w-md w-full mx-auto p-4 my-auto">
    <div class="bg-white text-gray-800 p-6 rounded-3xl shadow-xl space-y-4">
      <h2 class="font-bold text-xl text-center text-amber-700">📚 Notes Engine Filter</h2>
      <div><label class="text-xs text-gray-400 font-bold">Class</label><select id="nc" class="w-full p-2 border rounded-xl"><option>Class 10</option><option>Class 11</option><option>Class 12</option></select></div>
      <div><label class="text-xs text-gray-400 font-bold">Subject</label><select id="ns" class="w-full p-2 border rounded-xl"><option>Physics</option><option>Chemistry</option><option>Mathematics</option></select></div>
      <div><label class="text-xs text-gray-400 font-bold">Chapter</label><select id="nch" class="w-full p-2 border rounded-xl"><option>Chapter 1: Overview</option><option>Chapter 2: Systematic Blueprint</option></select></div>
      <button onclick="loadNotes()" class="w-full bg-amber-600 text-white font-bold py-2.5 rounded-xl">Submit</button>
      <a href="dashboard.html" class="block text-center text-xs font-bold text-gray-400 mt-2">Back</a>
    </div>
  </main>
  <footer class="bg-black/20 p-4 text-center text-xs text-purple-200 border-t border-white/10"><p class="font-bold">Made By Pathak Rohit</p></footer>
  <script>
    function loadNotes() {
      sessionStorage.setItem('notes_title', `${document.getElementById('ns').value}: ${document.getElementById('nch').value}`);
      window.location.href = 'notes-view.html';
    }
  </script>
</body>
</html>
